<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostel Relocation Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Hostel Relocation Tracker</h1>
        <p>Live occupancy and bed booking for Blocks A & B.</p>
      </header>

      <section id="authSection" class="panel auth-wrap">
        <div class="auth-card">
          <h2>Student Sign Up</h2>
          <form id="signupForm">
            <input name="name" placeholder="Full name" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Create Account</button>
          </form>
        </div>

        <div class="auth-card">
          <h2>Student Sign In</h2>
          <form id="signinForm">
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
          </form>
        </div>

        <div class="auth-card">
          <h2>Warden Login</h2>
          <form id="wardenForm">
            <input name="passcode" type="password" placeholder="Passcode" required />
            <button type="submit">Access Dashboard</button>
          </form>
        </div>
      </section>

      <section id="dashboardSection" class="panel hidden">
        <div class="toolbar">
          <h2 id="welcomeText"></h2>
          <div>
            <button id="vacateBtn" class="secondary hidden">Vacate My Room</button>
            <button id="refreshBtn" class="secondary">Refresh</button>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>

        <div id="stats" class="stats"></div>
        <div id="roomGrid" class="room-grid"></div>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
